services:
  postgres:
    image: postgres:16-alpine
    container_name: ancient-book-db
    environment:
      POSTGRES_USER: librarian
      POSTGRES_PASSWORD: restoration2024
      POSTGRES_DB: ancient_books
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U librarian -d ancient_books"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
